apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncsenta-ai-core
  namespace: syncsenta-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-core
  template:
    metadata:
      labels:
        app: ai-core
    spec:
      containers:
      - name: ai-core
        image: gcr.io/syncsenta-project/ai-core:latest
        ports:
        - containerPort: 8000
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: syncsenta-secrets
              key: gemini-api-key
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-core-hpa
  namespace: syncsenta-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: syncsenta-ai-core
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
